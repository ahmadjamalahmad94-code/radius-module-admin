<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>التحقق الثنائي — لوحة التراخيص</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="hub-auth-body">
  <main class="hub-login" style="grid-template-columns:1fr; max-width:440px">
    <section class="hub-login-form">
      <h1><i class="fa-solid fa-shield-halved" style="color:var(--hub-violet)"></i> التحقق الثنائي</h1>
      <p class="sub">أدخل الرمز المكوّن من 6 أرقام من تطبيق المصادقة.</p>

      {% include "_partials/_flash.html" %}

      <form method="post" action="{{ url_for('auth.two_factor_post') }}" style="display:grid; gap:14px">
        {{ csrf_input() }}
        <label class="hub-field">
          <span>رمز التحقق</span>
          <input class="hub-input" name="code" inputmode="numeric" pattern="[0-9]*"
                 maxlength="6" autocomplete="one-time-code" required autofocus
                 style="letter-spacing:.4em; text-align:center; font-size:20px">
        </label>
        <button type="submit" class="hub-btn hub-btn--primary" style="justify-content:center">
          <i class="fa-solid fa-check"></i> تأكيد الدخول
        </button>
      </form>
      <p class="sub" style="margin-top:14px">
        <a href="{{ url_for('auth.login') }}">العودة لتسجيل الدخول</a>
      </p>
    </section>
  </main>
</body>
</html>
