# Alembic — إطار الهجرات الرسمي للوحة (بديل تدريجي عن ensure_schema_compatibility)
# الاستخدام:
#   .venv/Scripts/python.exe -m alembic revision --autogenerate -m "وصف"
#   .venv/Scripts/python.exe -m alembic upgrade head
# رابط القاعدة يُقرأ من DATABASE_URL أو من مسار SQLite القياسي (env.py).
[alembic]
script_location = migrations_alembic
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
